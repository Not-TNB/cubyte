# gradle.properties — plugin metadata read by build.gradle.kts.
#
# `pluginId` must be unique across the JetBrains Marketplace. `com.cubyte`
# is the convention; change if it conflicts on the marketplace.

pluginId=com.cubyte
pluginName=Cubyte
pluginVersion=0.0.1

# Target the IntelliJ Platform's Java/Kotlin level. Update if bumping
# the IDE version in build.gradle.kts.
platformVersion=2024.2

# Kotlin compiler version (kept separate from the IntelliJ plugin
# version so they can be upgraded independently).
kotlinVersion=1.9.24

# Optional: enables verbose plugin loading logs at IDE startup.
# Uncomment while debugging `plugin.xml` extensions.
# idea.platform.debug.mode=true